<header class="app-topbar d-flex align-items-center gap-3">
 
  <button
    type="button"
    class="topbar-menu-btn d-lg-none"
    aria-label="Open menu"
    aria-controls="appSidebar">
    <svg class="icon" aria-hidden="true"><use href="#i-menu"></use></svg>
  </button>
 
  <div class="topbar-title-group flex-grow-1">
    <p class="topbar-title" id="chatTitle">Landing page copywriting ideas</p>
    <p class="topbar-subtitle d-none d-lg-block">SmartBot Pro &middot; Last active just now</p>
  </div>
 
  <span class="topbar-badge d-none d-lg-inline-flex">Pro</span>
 
  <button type="button" class="topbar-icon-btn" aria-label="Rename conversation">
    <svg class="icon" aria-hidden="true"><use href="#i-edit"></use></svg>
  </button>
 
</header>
