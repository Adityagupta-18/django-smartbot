<aside class="app-sidebar" id="appSidebar">
  <div class="sidebar-inner d-flex flex-column h-100">

    <!-- Brand -->
    <header class="sidebar-header d-flex align-items-center justify-content-between">
      <div class="sidebar-brand d-flex align-items-center gap-2">
        <svg class="sidebar-logo" aria-hidden="true"><use href="#i-logo"></use></svg>
        <span class="sidebar-brand-text">SmartBot</span>
      </div>
      <button type="button" class="sidebar-close-btn d-lg-none" aria-label="Close menu" aria-controls="appSidebar">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#i-x"></use></svg>
      </button>
    </header>

    <!-- New chat -->
    <button type="button" id="new-chat-btn" class="sidebar-new-chat-btn d-flex align-items-center justify-content-center gap-2 w-100">
      <svg class="icon icon-sm" aria-hidden="true"><use href="#i-plus"></use></svg>
      <span>New chat</span>
    </button>

    <!-- Search -->
    <form class="sidebar-search" role="search" aria-label="Search conversations">
      <label for="convSearch" class="visually-hidden">Search chats</label>
      <svg class="icon icon-sm sidebar-search-icon" aria-hidden="true"><use href="#i-search"></use></svg>
      <input
        type="search"
        id="convSearch"
        name="q"
        class="sidebar-search-input"
        placeholder="Search chats"
        autocomplete="off"
      >
    </form>

    <!-- Conversation history -->
    <nav class="sidebar-conversations flex-grow-1" aria-label="Conversation history">

      <div class="sidebar-group" id="today-group">
        <p class="sidebar-group-label">Today</p>

        {% for conv in all_conversations %}
        <a href="{% url "conversation_detail" conversation_id=conv.id %}" class="sidebar-conversation {% if conversation.id == conv.id %}active{% endif %}" data-title="{{conv.title}}">
          <svg class="icon icon-sm" aria-hidden="true"><use href="#i-chat"></use></svg>
          <span class="sidebar-conversation-title">{{ conv.title }}</span>
          <svg class="icon icon-sm sidebar-conversation-more" aria-hidden="true"><use href="#i-dots"></use></svg>
        </a>
        {% endfor %}
        
      </div>

      <div class="sidebar-group">
        <p class="sidebar-group-label">Previous 7 days</p>

        <a href="#" class="sidebar-conversation" data-title="Portfolio site content review">
          <svg class="icon icon-sm" aria-hidden="true"><use href="#i-chat"></use></svg>
          <span class="sidebar-conversation-title">Portfolio site content review</span>
          <svg class="icon icon-sm sidebar-conversation-more" aria-hidden="true"><use href="#i-dots"></use></svg>
        </a>

        <a href="#" class="sidebar-conversation" data-title="Interview prep — system design">
          <svg class="icon icon-sm" aria-hidden="true"><use href="#i-chat"></use></svg>
          <span class="sidebar-conversation-title">Interview prep — system design</span>
          <svg class="icon icon-sm sidebar-conversation-more" aria-hidden="true"><use href="#i-dots"></use></svg>
        </a>
      </div>

      <p class="sidebar-empty d-none" id="noConvoResults">No conversations found</p>
    </nav>

    <!-- Profile footer -->
    <footer class="sidebar-footer d-flex align-items-center gap-2">
      <div class="sidebar-avatar" aria-hidden="true">AS</div>

      <div class="sidebar-user flex-grow-1">
        <p class="sidebar-user-name">Aditya Sharma</p>
        <p class="sidebar-user-plan">Pro plan</p>
      </div>

      <button type="button" class="sidebar-icon-btn" aria-label="Open settings">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#i-gear"></use></svg>
      </button>

      <button type="button" class="sidebar-icon-btn" aria-label="Log out">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#i-logout"></use></svg>
      </button>
    </footer>

  </div>
</aside>
